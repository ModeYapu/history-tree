<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史之树 - 诊断测试</title>
    <style>
        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: #1a1410;
            color: #F0D68A;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-section {
            background: rgba(42, 33, 24, 0.8);
            border: 1px solid rgba(212, 168, 83, 0.2);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #D4A853;
        }
        .test-result {
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
        }
        .pass {
            background: rgba(76, 175, 80, 0.2);
            border-left: 3px solid #4CAF50;
        }
        .fail {
            background: rgba(244, 67, 54, 0.2);
            border-left: 3px solid #F44336;
        }
        .warn {
            background: rgba(255, 193, 7, 0.2);
            border-left: 3px solid #FFC107;
        }
        button {
            background: linear-gradient(135deg, #D4A853, #B8860B);
            color: #1a1410;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 168, 83, 0.3);
        }
        #console-output {
            background: #0d0a08;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            color: #C9A96E;
        }
        .summary {
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.1), rgba(184, 134, 11, 0.05));
            border: 2px solid rgba(212, 168, 83, 0.3);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: #D4A853;">🌳 历史之树 - 核心功能诊断</h1>

    <div class="test-section">
        <div class="test-title">📦 1. 关键库加载测试</div>
        <div id="library-tests"></div>
    </div>

    <div class="test-section">
        <div class="test-title">📄 2. 关键脚本加载测试</div>
        <div id="script-tests"></div>
    </div>

    <div class="test-section">
        <div class="test-title">📊 3. 数据文件测试</div>
        <div id="data-tests"></div>
    </div>

    <div class="test-section">
        <div class="test-title">🔧 4. 核心类测试</div>
        <div id="class-tests"></div>
    </div>

    <div class="test-section">
        <div class="test-title">🎨 5. 样式文件测试</div>
        <div id="style-tests"></div>
    </div>

    <div class="test-section">
        <div class="test-title">📝 6. 控制台输出</div>
        <div id="console-output"></div>
    </div>

    <div class="summary" id="summary"></div>

    <!-- 加载关键库 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <script>
        // 捕获控制台输出
        const consoleOutput = document.getElementById('console-output');
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        function addToConsole(message, type = 'log') {
            const colors = { log: '#C9A96E', error: '#F44336', warn: '#FFC107' };
            const div = document.createElement('div');
            div.style.color = colors[type];
            div.textContent = `[${type.toUpperCase()}] ${message}`;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToConsole(args.join(' '), 'warn');
        };

        // 测试结果
        const results = {
            pass: 0,
            fail: 0,
            warn: 0
        };

        function addResult(containerId, name, passed, message) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = `test-result ${passed ? 'pass' : 'fail'}`;
            div.innerHTML = `<strong>${passed ? '✓' : '✗'}</strong> ${name}${message ? `: ${message}` : ''}`;
            container.appendChild(div);

            if (passed) results.pass++;
            else results.fail++;
        }

        function addWarn(containerId, name, message) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'test-result warn';
            div.innerHTML = `<strong>⚠</strong> ${name}: ${message}`;
            container.appendChild(div);
            results.warn++;
        }

        // 测试库加载
        function testLibraries() {
            addResult('library-tests', 'D3.js', typeof d3 !== 'undefined', d3 ? `v${d3.version}` : '未加载');
            addResult('library-tests', 'Three.js', typeof THREE !== 'undefined', THREE ? `r${THREE.REVISION}` : '未加载');
            addResult('library-tests', 'OrbitControls', typeof THREE.OrbitControls !== 'undefined', '相机控制器');
            addResult('library-tests', 'Leaflet', typeof L !== 'undefined', L ? `v${L.version}` : '未加载');
            addResult('library-tests', 'Fuse.js', typeof Fuse !== 'undefined', '模糊搜索');
        }

        // 测试脚本加载
        async function testScripts() {
            const scripts = [
                { name: 'EventBus', path: 'src/core/EventBus.js', check: () => typeof EventBus !== 'undefined' },
                { name: 'StateManager', path: 'src/core/StateManager.js', check: () => typeof StateManager !== 'undefined' },
                { name: 'Router', path: 'src/core/Router.js', check: () => typeof Router !== 'undefined' },
                { name: 'HistoryNode', path: 'src/models/HistoryNode.js', check: () => typeof HistoryNode !== 'undefined' },
                { name: 'SearchEngine', path: 'src/services/SearchEngine.js', check: () => typeof SearchEngine !== 'undefined' },
                { name: 'DataService', path: 'src/services/DataService.js', check: () => typeof DataService !== 'undefined' },
                { name: 'HistoryTree3D', path: 'src/views/HistoryTree3D.js', check: () => typeof HistoryTree3D !== 'undefined' },
                { name: 'AIChat', path: 'src/components/AIChat.js', check: () => typeof AIChat !== 'undefined' }
            ];

            for (const script of scripts) {
                try {
                    const response = await fetch(script.path);
                    if (response.ok) {
                        // 尝试加载脚本
                        await new Promise((resolve, reject) => {
                            const scriptEl = document.createElement('script');
                            scriptEl.src = script.path;
                            scriptEl.onload = resolve;
                            scriptEl.onerror = reject;
                            document.head.appendChild(scriptEl);
                        });

                        // 检查是否定义了类
                        if (script.check()) {
                            addResult('script-tests', script.name, true, '已加载');
                        } else {
                            addWarn('script-tests', script.name, '文件存在但类未定义');
                        }
                    } else {
                        addResult('script-tests', script.name, false, `HTTP ${response.status}`);
                    }
                } catch (error) {
                    addResult('script-tests', script.name, false, error.message);
                }
            }
        }

        // 测试数据文件
        async function testDataFiles() {
            const dataFiles = [
                { name: '历史数据集', path: 'data/historical-dataset.js', check: () => typeof HistoricalDataset !== 'undefined' },
                { name: '中国朝代', path: 'data/chinese-dynasties.js', check: () => typeof ChineseDynasties !== 'undefined' },
                { name: '世界文明', path: 'data/world-civilizations.js', check: () => typeof WorldCivilizations !== 'undefined' }
            ];

            for (const dataFile of dataFiles) {
                try {
                    const response = await fetch(dataFile.path);
                    if (response.ok) {
                        await new Promise((resolve, reject) => {
                            const scriptEl = document.createElement('script');
                            scriptEl.src = dataFile.path;
                            scriptEl.onload = resolve;
                            scriptEl.onerror = reject;
                            document.head.appendChild(scriptEl);
                        });

                        if (dataFile.check()) {
                            addResult('data-tests', dataFile.name, true, '已加载');
                        } else {
                            addWarn('data-tests', dataFile.name, '文件存在但数据未定义');
                        }
                    } else {
                        addResult('data-tests', dataFile.name, false, `HTTP ${response.status}`);
                    }
                } catch (error) {
                    addResult('data-tests', dataFile.name, false, error.message);
                }
            }
        }

        // 测试样式文件
        async function testStyleFiles() {
            const styles = [
                { name: '主样式', path: 'css/style.css' },
                { name: '树形样式', path: 'css/tree.css' },
                { name: '动画样式', path: 'css/animations.css' }
            ];

            for (const style of styles) {
                try {
                    const response = await fetch(style.path);
                    addResult('style-tests', style.name, response.ok, response.ok ? '已加载' : `HTTP ${response.status}`);
                } catch (error) {
                    addResult('style-tests', style.name, false, error.message);
                }
            }
        }

        // 测试核心类
        function testCoreClasses() {
            // 需要在脚本加载后运行
            setTimeout(() => {
                addResult('class-tests', 'EventBus', typeof EventBus !== 'undefined', '事件总线');
                addResult('class-tests', 'StateManager', typeof StateManager !== 'undefined', '状态管理');
                addResult('class-tests', 'Router', typeof Router !== 'undefined', '路由器');
                addResult('class-tests', 'HistoryNode', typeof HistoryNode !== 'undefined', '历史节点');
                addResult('class-tests', 'SearchEngine', typeof SearchEngine !== 'undefined', '搜索引擎');
                addResult('class-tests', 'DataService', typeof DataService !== 'undefined', '数据服务');
                addResult('class-tests', 'HistoryTree3D', typeof HistoryTree3D !== 'undefined', '3D树视图');
                addResult('class-tests', 'AIChat', typeof AIChat !== 'undefined', 'AI聊天组件');

                showSummary();
            }, 2000);
        }

        // 显示总结
        function showSummary() {
            const summary = document.getElementById('summary');
            const total = results.pass + results.fail;
            const passRate = total > 0 ? ((results.pass / total) * 100).toFixed(1) : 0;

            let score = '🔴 需要修复';
            if (passRate >= 90) score = '🟢 优秀';
            else if (passRate >= 70) score = '🟡 良好';
            else if (passRate >= 50) score = '🟠 一般';

            summary.innerHTML = `
                <h2 style="color: #D4A853;">📊 诊断总结</h2>
                <div style="font-size: 18px; margin: 15px 0;">
                    <strong>状态:</strong> ${score}<br>
                    <strong>通过率:</strong> ${passRate}% (${results.pass}/${total})<br>
                    <strong>警告:</strong> ${results.warn}
                </div>
                <div style="margin-top: 15px;">
                    ${results.fail > 0 ? '<strong style="color: #F44336;">❌ 有核心功能需要修复</strong>' : '<strong style="color: #4CAF50;">✅ 核心功能正常</strong>'}
                </div>
                <button onclick="location.href='index.html'" style="margin-top: 15px;">
                    返回主应用
                </button>
            `;
        }

        // 运行所有测试
        async function runAllTests() {
            console.log('🔍 开始诊断测试...');

            testLibraries();
            await testScripts();
            await testDataFiles();
            await testStyleFiles();
            testCoreClasses();

            console.log('✅ 测试完成');
        }

        // 页面加载后运行测试
        window.addEventListener('DOMContentLoaded', runAllTests);
    </script>
</body>
</html>
