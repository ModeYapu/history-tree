            content: '';

        }

        #app {

        }

        .top-nav::after {
            content: '';

            bottom: -1px;
            left: 10%; right: 10%;

            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);

        .logo {

            top: 0;

        .nav-btn:hover {

            border-color: var(--border-active);
            color: var(--gold-light);

            box-shadow: 0 4px 12px rgba(212, 168, 83, 0.2);

            transform: translateY(0) scale(0.98);

            border-color: transparent;
            color: var(--bg-primary);
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(212, 168, 83, 0.3);
        }

        .status-bar {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;

        /* 主视图容器 */

        @keyframes loadingGrow {
            0%, 100% { transform: scale(1) rotate(-1deg); }
            25% { transform: scale(1.1) rotate(1deg); }
            50% { transform: scale(1.05) rotate(0deg); }
            75% { transform: scale(1.08) rotate(-0.5deg); }
        }

        .loading-text {
            margin-top: 32px;
            font-size: 18px;
            color: var(--gold-primary);
            letter-spacing: 2px;
            font-weight: 600;
        }

        .loading-progress {
            margin-top: 24px;
            width: 260px;
            height: 4px;
            background: rgba(212, 168, 83, 0.12);
            border-radius: 4px;
            overflow: hidden;

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-primary), var(--gold-light));
            animation: progressFill 2.5s ease-in-out forwards;
            border-radius: 4px;
        }

        @keyframes progressFill {
            0% { width: 0%; }
            20% { width: 18%; }
            50% { width: 52%; }
            80% { width: 82%; }
            100% { width: 100%; }
        }

        /* 响应式 */

            .top-nav {

            .status-bar {
                display: none;

                margin-top: 56px;

    <script>
        // 应用初始化
        let app;
        
        async function initApplication() {
            console.log('🌳 历史之树 v4.4 初始化中...');
            
            try {
                // 创建应用实例
                app = new HistoryTreeApp({
                    container: '#mainView',
                    dataPath: './data'
                });
                
                // 暴露到全局（调试用）
                window.app = app;
                
                // 等待应用初始化完成（轮询方式，避免事件竞态）
                await new Promise((resolve) => {
                    const check = () => {
                        if (app.dataService && app.dataService.stats.totalNodes > 0) {
                            resolve();
                        } else {
                            setTimeout(check, 100);
                        }
                    };
                    check();
                });

                // 延迟显示树形视图，确保所有组件初始化完成
                await new Promise(r => setTimeout(r, 500));
                app.showView('tree');

                // 更新节点数量显示
                const nodeCountEl = document.getElementById('nodeCount');
                if (nodeCountEl && app.dataService) {
                    nodeCountEl.textContent = app.dataService.stats.totalNodes || 0;
                }
                
                // 隐藏加载动画
                const loadingTree = document.querySelector('.loading-tree');
                if (loadingTree) loadingTree.style.display = 'none';
                
                // 加载数据集（已由 DataService.loadCoreData 处理）
                // await loadHistoricalData();
                
                // 初始化UI
                initUI();
                
                // 初始化性能监控
                initPerformanceMonitor();

                // 初始化在线状态监控
                initOnlineStatusMonitor();
                
                // 隐藏加载屏幕
                hideLoadingScreen();

                // 确保加载屏幕在最多5秒后一定会隐藏（防止初始化失败导致一直显示）
                setTimeout(() => {
                    hideLoadingScreen();
                }, 5000);
                
                // 显示欢迎信息
                showWelcome();
                
                console.log('✅ 应用初始化完成');
                
            } catch (error) {
                console.error('❌ 应用初始化失败:', error);
                hideLoadingScreen(); // 确保错误时也隐藏加载屏幕
                showError(error);
            }
        }
        
        // 加载历史数据
        async function loadHistoricalData() {
            console.log('📚 加载历史数据...');
            
            const dataset = HistoricalDataset;
            let count = 0;
            
            // 加载各个时期的数据
            for (const period of Object.keys(dataset)) {
                const periodData = dataset[period];
                
                // 加载事件
                if (periodData.events) {
                    periodData.events.forEach(event => {
                        const node = new HistoryNode(event);
                        app.dataService.nodes.set(node.id, node);
                        app.dataService.indexNode(node);
                        count++;
                    });
                }
                
                // 加载人物
                if (periodData.persons) {
                    periodData.persons.forEach(person => {
                        const node = new HistoryNode(person);
                        app.dataService.nodes.set(node.id, node);
                        app.dataService.indexNode(node);
                        count++;
                    });
                }
            }
            
            // 更新统计
            app.dataService.stats.totalNodes = count;
            
            // 更新UI
            document.getElementById('nodeCount').textContent = count;
            
            console.log(`✅ 加载了 ${count} 个历史节点`);
        }
        
        // 初始化UI
        function initUI() {
            // 导航按钮
            document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const view = btn.dataset.view;
                    switchView(view);
                    
                    // 更新按钮状态
                    document.querySelectorAll('.nav-btn[data-view]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            
            // 模型选择器按钮
            document.getElementById('modelSelectorBtn').addEventListener('click', () => {
                if (app.modelSelector) {
                    app.modelSelector.toggle();
                } else {
                    console.warn('模型选择器未初始化');
                }
            });

            // 主题切换按钮
            const themeToggleBtn = document.getElementById('themeToggleBtn');
            if (themeToggleBtn && window.themeManager) {
                const updateThemeButton = () => {
                    const themeInfo = themeManager.getThemeInfo();
                    themeToggleBtn.textContent = `${themeInfo.icon} ${themeInfo.name}`;
                };
                updateThemeButton();

                themeToggleBtn.addEventListener('click', () => {
                    themeManager.toggle();
                    updateThemeButton();
                });

                // 监听主题变化
                themeManager.addListener((themeName) => {
                    updateThemeButton();
                    console.log(`🎨 主题已切换到: ${themeName}`);
                });
            }
            
            // 初始化组件
            app.getComponent('searchBar');
            app.getComponent('filterPanel');
            app.getComponent('aiChat');
            app.getComponent('nodeCard');
            app.getComponent('philosophyUI');

            // 初始化快捷键帮助
            if (typeof ShortcutHelp !== 'undefined') {
                const shortcutHelp = new ShortcutHelp();
                shortcutHelp.init();
                app.shortcutHelp = shortcutHelp;
                console.log('✅ 快捷键帮助初始化完成');
            }

            // 初始化知识卡片
            if (typeof KnowledgeCard !== 'undefined') {
                const knowledgeCard = new KnowledgeCard(app);
                knowledgeCard.init();
                app.knowledgeCard = knowledgeCard;
                console.log('✅ 知识卡片初始化完成');
            }

            // 初始化模型选择器
            if (typeof ModelSelector !== 'undefined' && app.modelManager) {
                app.modelSelector = new ModelSelector(app);
                app.modelSelector.render();
                console.log('✅ 模型选择器初始化完成');
            }
            
            // 显示默认视图（已在初始化时通过 showView 调用，此处不再重复）
            // app.showView('tree');
        }
        
        // 切换视图
        function switchView(viewName) {
            app.showView(viewName);
        }
        
        // 初始化性能监控
        function initPerformanceMonitor() {
            const optimizer = new PerformanceOptimizer(app);
            window.performanceOptimizer = optimizer;
            
            // 定期更新状态栏
            setInterval(() => {
                const report = optimizer.getPerformanceReport();
                
                document.getElementById('fpsCounter').textContent = report.metrics.fps;
                document.getElementById('memoryUsage').textContent = report.metrics.memory.toFixed(0);
            }, 1000);
        }

        // 初始化在线状态监控
        function initOnlineStatusMonitor() {
            const offlineStatus = document.getElementById('offlineStatus');

            function updateOnlineStatus() {
                if (navigator.onLine) {
                    offlineStatus.style.display = 'none';
                } else {
                    offlineStatus.style.display = 'flex';
                }
            }

        /** 初始化背景微粒子漂浮效果 */
        function initBgParticles() {
            const canvas = document.createElement('canvas');
            canvas.id = 'bg-particles';
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 0.5) * 0.15,
                    r: 0.5 + Math.random() * 1.5,
                    alpha: 0.05 + Math.random() * 0.15,
                    color: Math.random() > 0.6 ? '#D4A853' : '#8b7355'
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }
            animate();
        }

        /** 初始化音效切换按钮 */
        function initAudioToggle() {
            if (!window.audioManager) return;
            const btn = document.createElement('button');
            btn.className = 'audio-toggle';
            btn.textContent = '🔊';
            btn.title = '切换音效';
            btn.addEventListener('click', () => {
                const muted = window.audioManager.toggleMute();
                btn.textContent = muted ? '🔇' : '🔊';
                btn.classList.toggle('muted', muted);
            });
            document.body.appendChild(btn);
        }

            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen) {

                loadingScreen.style.transition = 'opacity 0.8s ease';

                setTimeout(() => {
                    if (loadingScreen.parentNode) {
                        loadingScreen.remove();
                    }
                }, 800);
            }
            
            // 初始化背景微粒子
            initBgParticles();

            // 初始化音效切换按钮
            initAudioToggle();
        }

        // 快捷键支持
        document.addEventListener('keydown', (e) => {
            // Ctrl+1-6 切换视图
            if (e.ctrlKey && e.key >= '1' && e.key <= '6') {
                e.preventDefault();
                const views = ['tree', 'tree3d', 'timeline', 'network', 'map', 'cards'];
                const idx = parseInt(e.key) - 1;
                if (views[idx]) {
                    switchView(views[idx]);
                    document.querySelectorAll('.nav-btn[data-view]').forEach(b => b.classList.remove('active'));
                    const targetBtn = document.querySelector(`.nav-btn[data-view="${views[idx]}"]`);
                    if (targetBtn) targetBtn.classList.add('active');
                }
            }
            // Ctrl+K 搜索
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                const searchInput = document.querySelector('.search-bar input');
                if (searchInput) searchInput.focus();
            }
            // Ctrl+E 导出
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                if (app) app.export('json');
            }
            // Escape 关闭弹窗
            if (e.key === 'Escape') {
                // 关闭AI聊天
                const aiChat = app?.getComponent('aiChat');
                if (aiChat && aiChat.isOpen) aiChat.toggle();
            }
        });
